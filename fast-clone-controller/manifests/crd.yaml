apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: qnapfastclones.qnap.mii.dev
spec:
  group: qnap.mii.dev
  scope: Namespaced
  names:
    plural: qnapfastclones
    singular: qnapfastclone
    kind: QnapFastClone
    shortNames:
      - qfc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - sourceSnapshotName
              properties:
                sourceSnapshotName:
                  type: string
                sourceSnapshotNamespace:
                  type: string
                targetPVCName:
                  type: string
                targetNamespace:
                  type: string
                targetPVName:
                  type: string
                nasCloneName:
                  type: string
                storageClassName:
                  type: string
                capacity:
                  type: string
                accessModes:
                  type: array
                  items:
                    type: string
                volumeMode:
                  type: string
                mountOptions:
                  type: array
                  items:
                    type: string
                reclaimPolicy:
                  type: string
                  enum:
                    - Retain
                    - Delete
                    - Recycle
                smbUser:
                  type: string
                backendUUID:
                  type: string
                csiDriver:
                  type: string
                nodeStageSecretName:
                  type: string
                nodeStageSecretNamespace:
                  type: string
                tridentNamespace:
                  type: string
                tridentPool:
                  type: string
                sharePermissionMode:
                  type: string
                checkExistingNasClone:
                  type: string
                  x-kubernetes-int-or-string: true
                forceBoundStatus:
                  type: string
                  x-kubernetes-int-or-string: true
                registrationMode:
                  type: string
                  enum:
                    - direct
                    - import
                    - import-pvc
                    - import-rebind
                    - proxy-direct
                tridentBackendName:
                  type: string
                tridentStorageClassName:
                  type: string
                importWaitSeconds:
                  type: string
                  x-kubernetes-int-or-string: true
                importCapacity:
                  type: string
                restartTridentController:
                  type: string
                  x-kubernetes-int-or-string: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: PVC
          type: string
          jsonPath: .status.targetPVCName
        - name: Share
          type: string
          jsonPath: .status.shareName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
